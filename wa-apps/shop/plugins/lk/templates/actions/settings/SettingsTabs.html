<ul class="{$tab_class} js-lk-settings-tabs custom-mt-0">
    {foreach $settings_tabs as $tab}
        <li data-tab="{$tab.id|escape}">
            <a href="{$tab.hash|escape}">{$tab.name|escape}</a>
        </li>
    {/foreach}
</ul>


<script>
    (function($) {
        var active_tab_class = '{$active_tab_class}';

        function getTabs() {
            var tabs = {};

            $('.js-lk-settings-tabs li').each(function() {
                var tab = $(this).data('tab');
                var hash = $(this).find('a').attr('href');

                if (tab && hash) {
                    tabs[hash] = tab;
                }
            });

            return tabs;
        }

        function getTab(tabs) {
            return tabs[window.location.hash] || tabs['#/lk'] || 'main';
        }

        function showTab(tab) {
            $('.js-lk-settings-tab').hide();
            $('.js-lk-settings-tab[data-tab="' + tab + '"]').show();

            $('.js-lk-settings-tabs li').removeClass('accented selected');
            $('.js-lk-settings-tabs li[data-tab="' + tab + '"]').addClass(active_tab_class);
        }

        $(function() {
            var tabs = getTabs();

            showTab(getTab(tabs));

            $(window).on('hashchange', function() {
                showTab(getTab(tabs));
            });

            $('.js-lk-settings-tabs a').on('click', function() {
                var href = $(this).attr('href');

                showTab(tabs[href] || 'main');
            });
        });
    })(jQuery);
</script>
