{* Настройки текущего таба *}
{$set = $settings.sections.carts|default:[]}

<div class="field">
    <div class="name">Раздел «Корзины»</div>
    <div class="value">
        <label>
            <input type="hidden" name="shop_lk[sections][carts][enabled]" value="0">
            <input type="checkbox" name="shop_lk[sections][carts][enabled]" value="1" {if !empty($set.enabled)}
                checked{/if}>
            Включить
        </label>
    </div>
</div>


<div class="field">
    <div class="name">Название</div>
    <div class="value">
        <input type="text" name="shop_lk[sections][carts][name]"
            value="{if !empty($set.name)}{$set.name|escape}{else}Корзины{/if}">
    </div>
</div>

<div class="field">
    <div class="name">Адрес раздела</div>
    <div class="value">
        <input type="text" name="shop_lk[sections][carts][path]"
            value="{if !empty($set.path)}{$set.path|escape}{else}carts{/if}">
        <p class="hint">
            Относительный URL раздела. Например: /my/<b class="js-fill-input" class="js-fill-input">carts</b>/
        </p>
    </div>
</div>

<div class="field">
    <div class="name">Иконка</div>
    <div class="value">
        <input type="text" name="shop_lk[sections][carts][icon]" value="{if !empty($set.icon)}{$set.icon|escape}{/if}">
        <p class="hint">
            Используйте HTML-код иконки
            <a href="https://icons.getbootstrap.com/" target="_blank">Bootstrap Icons</a> или
            <a href="https://fontawesome.com/search?ic=free-collection" target="_blank">FontAwesome 7 Free</a>.
            <br>
            Например: <b class="js-fill-input">{'<i class="bi bi-cart-check"></i>'|escape}</b>
        </p>

    </div>
</div>
