<div class="lk-settings-page lk-auth-page">

    <h2>
        Авторизация — {$row.domain|escape} <code>{$row.shop_label|escape}</code>
    </h2>

    <form action="{$save_url|escape}" method="post" id="plugins-settings-form">
        {$wa->csrf()}

        <input type="hidden" name="page" value="auth">
        <input type="hidden" name="storefront" value="{$storefront_key|escape}">

        <div class="fields form">

            <div class="field">
                <div class="name">Фоновое изображение</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_bg_url]"
                        value="{$auth.auth_bg_url|default:''|escape}">
                </div>
            </div>

            <div class="field">
                <div class="name">Логотип</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_logo_img_url]"
                        value="{$auth.auth_logo_img_url|default:''|escape}">
                </div>
            </div>

            <div class="field">
                <div class="name">Текст логотипа</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_logo_text]"
                        value="{$auth.auth_logo_text|default:''|escape}">
                </div>
            </div>

            <div class="field">
                <div class="name">Слоган</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_logo_slogan]"
                        value="{$auth.auth_logo_slogan|default:''|escape}">
                </div>
            </div>

            <div class="field">
                <div class="name">Заголовок</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_hero_title]"
                        value="{$auth.auth_hero_title|default:''|escape}">
                </div>
            </div>

            <div class="field">
                <div class="name">Описание</div>
                <div class="value">
                    <textarea
                        name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_hero_text]">{$auth.auth_hero_text|default:''|escape}</textarea>
                </div>
            </div>

            <div class="field">
                <div class="name">Ссылка менеджера</div>
                <div class="value">
                    <input type="text" name="shop_lk[storefronts][{$storefront_key|escape}][auth][auth_shop_url]"
                        value="{$auth.auth_shop_url|default:''|escape}">
                </div>
            </div>

            <div class="field submit">
                <div class="value submit">
                    <input type="submit" class="button green" value="Сохранить">
                    <a href="{$back_url|escape}" class="button light-gray">Назад</a>
                    <span id="plugins-settings-form-status" style="display:none"></span>
                </div>
            </div>

        </div>
    </form>

</div>
