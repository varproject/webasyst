<div class="lk-settings-page">

    <h2>
        Разделы — {$row.domain|escape} <code>{$row.shop_label|escape}</code>
    </h2>

    <form action="{$save_url|escape}" method="post" id="plugins-settings-form">
        {$wa->csrf()}

        <input type="hidden" name="page" value="sections">
        <input type="hidden" name="storefront" value="{$storefront_key|escape}">

        <table class="zebra lk-sections-table">
            <thead>
                <tr>
                    <th class="lk-sections-table__check">Вкл</th>
                    <th>Название</th>
                    <th>URL</th>
                    <th>Иконка</th>
                </tr>
            </thead>

            <tbody>
                {foreach $sections as $section}
                    {$id = $section.id}

                    <tr>
                        <td class="lk-sections-table__check">
                            {if !empty($section.always_enabled)}
                                <input type="hidden"
                                    name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][enabled]"
                                    value="1">
                                <input type="checkbox" checked disabled>
                            {else}
                                <input type="hidden"
                                    name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][enabled]"
                                    value="0">
                                <input type="checkbox"
                                    name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][enabled]"
                                    value="1" {if !empty($section.enabled)}checked{/if}>
                            {/if}
                        </td>

                        <td>
                            <input type="text"
                                name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][name]"
                                value="{$section.name|escape}">
                        </td>

                        <td>
                            <input type="text" class="short"
                                name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][path]"
                                value="{$section.path|escape}">
                        </td>

                        <td>
                            <input type="text"
                                name="shop_lk[storefronts][{$storefront_key|escape}][sections][{$id|escape}][icon]"
                                value="{$section.icon|escape}">
                        </td>
                    </tr>
                {/foreach}
            </tbody>
        </table>

        <div class="field submit">
            <div class="value submit">
                <input type="submit" class="button green" value="Сохранить">
                <a href="{$back_url|escape}" class="button light-gray">Назад</a>
                <span id="plugins-settings-form-status" style="display:none"></span>
            </div>
        </div>
    </form>

</div>
