<h1>Личный кабинет</h1>

{if empty($companies)}
    <div class="lk-alert">Добавьте первую компанию, чтобы начать работу с B2B-кабинетом.</div>
    <p><a class="lk-button" href="{$lk_urls.companies|escape}">Добавить компанию</a></p>
{else}
    <div class="lk-card">
        <h2>Активная компания</h2>
        {if $active_company}
            <p><strong>{$active_company.company|default:$active_company.name|escape}</strong></p>
        {else}
            <p>Компания не выбрана.</p>
        {/if}
    </div>
{/if}
