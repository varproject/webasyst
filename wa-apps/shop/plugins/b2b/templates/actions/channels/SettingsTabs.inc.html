<ul class="tabs wide nowrap b2b-channel-tabs custom-pt-8">
    {foreach $tabs as $tab}
        <li class="{if !empty($tab.active)}selected{/if}">
            <a href="{$tab.url|escape}" data-b2b-tab="{$tab.id|escape}">
                {if !empty($tab.icon)}<i class="icon {$tab.icon|escape}"></i>{/if}
                {$tab.label|escape}
            </a>
        </li>
    {/foreach}
</ul>
