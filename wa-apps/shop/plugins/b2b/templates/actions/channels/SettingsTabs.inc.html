<ul class="tabs wide nowrap b2b-channel-tabs custom-pt-8">
    {foreach $tabs as $tab}
        <li class="{if !empty($tab.active)}selected{/if}">
            <a href="{$tab.url|escape}" data-b2b-tab="{$tab.id|escape}">
                {if !empty($tab.icon)}<i class="icon {$tab.icon|escape}"></i>{/if}
                {$tab.label|escape}
            </a>
        </li>
    {/foreach}
    {if !empty($settings.open_url)}
        <li class="b2b-channel-tabs__open">
            <a class="button small" href="{$settings.open_url|escape}" target="_blank" rel="noopener">
                <i class="icon fas fa-external-link-alt"></i> Открыть витрину
            </a>
        </li>
    {/if}
</ul>
