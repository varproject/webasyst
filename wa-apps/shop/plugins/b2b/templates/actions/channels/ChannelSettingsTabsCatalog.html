<div class="fields-group">
    <div class="field">
        <div class="name">Включён</div>
        <div class="value"><label><input type="checkbox" name="data[params][b2b_catalog_enabled]" value="1"
                    {if !empty($settings.enabled)}checked{/if}> показывать каталог</label></div>
    </div>
    <div class="field">
        <div class="name">URL</div>
        <div class="value"><input type="text" name="data[params][b2b_catalog_url]" value="{$settings.url|escape}"></div>
    </div>
    <div class="field">
        <div class="name">Название</div>
        <div class="value"><input type="text" name="data[params][b2b_catalog_title]" value="{$settings.title|escape}">
        </div>
    </div>
    <div class="field">
        <div class="name">Категории товаров</div>
        <div class="value"><select name="data[params][b2b_catalog_category_mode]">
                <option value="all" {if $settings.category_mode == 'all'}selected{/if}>все</option>
                <option value="selected" {if $settings.category_mode == 'selected'}selected{/if}>только выбранные
                </option>
                <option value="except" {if $settings.category_mode == 'except'}selected{/if}>кроме выбранных</option>
            </select></div>
    </div>
    <div class="field">
        <div class="name">ID категорий</div>
        <div class="value"><input type="text" name="data[params][b2b_catalog_category_ids]"
                value="{foreach $settings.category_ids as $id}{$id|escape}
                    {if !$id@last},
                    {/if}
                {/foreach}"
                placeholder="ID через запятую"></div>
    </div>
    <div class="field">
        <div class="name">ID исключений</div>
        <div class="value"><input type="text" name="data[params][b2b_catalog_except_category_ids]"
                value="{foreach $settings.except_category_ids as $id}{$id|escape}
                    {if !$id@last},
                    {/if}
                {/foreach}"
                placeholder="ID через запятую"></div>
    </div>
</div>
<div class="fields-group">
    <div class="field">
        <div class="name">Вывод</div>
        <div class="value"><label><input type="checkbox" name="data[params][b2b_catalog_show_empty_categories]"
                    value="1" {if !empty($settings.show_empty_categories)}checked{/if}> пустые
                категории</label><br><label><input type="checkbox" name="data[params][b2b_catalog_show_product_count]"
                    value="1" {if !empty($settings.show_product_count)}checked{/if}> количество
                товаров</label><br><label><input type="checkbox" name="data[params][b2b_catalog_show_filters]" value="1"
                    {if !empty($settings.show_filters)}checked{/if}> фильтры</label><br><label><input type="checkbox"
                    name="data[params][b2b_catalog_show_search]" value="1"
                    {if !empty($settings.show_search)}checked{/if}> поиск</label></div>
    </div>
    <div class="field">
        <div class="name">Товары на странице</div>
        <div class="value"><input type="number" name="data[params][b2b_catalog_products_per_page]"
                value="{$settings.products_per_page|escape}" min="1"></div>
    </div>
    <div class="field">
        <div class="name">Сортировка</div>
        <div class="value"><input type="text" name="data[params][b2b_catalog_default_sort]"
                value="{$settings.default_sort|escape}"></div>
    </div>
    <div class="field">
        <div class="name">Коммерческие данные</div>
        <div class="value"><label><input type="checkbox" name="data[params][b2b_catalog_show_prices]" value="1"
                    {if !empty($settings.show_prices)}checked{/if}> цены</label><br><label><input type="checkbox"
                    name="data[params][b2b_catalog_show_compare_price]" value="1"
                    {if !empty($settings.show_compare_price)}checked{/if}> зачёркнутые цены</label><br><label><input
                    type="checkbox" name="data[params][b2b_catalog_show_stock]" value="1"
                    {if !empty($settings.show_stock)}checked{/if}> остатки</label></div>
    </div>
</div>
