<div class="fields form">
    <form action="{$wa_app_url}?module=channels&action=save" id="js-sales-channel-form">

        {if !empty($channel.id)}
            <input type="hidden" name="id" value="{$channel.id|escape}">
        {else}
            <input type="hidden" name="is_new" value="1">
        {/if}

        <input type="hidden" name="data[type]" value="{$channel.type|escape}">

        <div class="fields-group custom-mt-16">
            <div class="field">
                <div class="name">
                    [`Enabled`]
                </div>
                <div class="value">
                    <label>
                        <input type="checkbox" name="data[status]" value="1" {if !empty($channel.status)} checked{/if}>
                    </label>
                </div>
            </div>

            {foreach $base_fields as $name => $control_html}
                <div class="field">
                    {$control_html}
                </div>
            {/foreach}
        </div>

        <div class="fields-group custom-mt-24">
            <h5 class="heading">B2B-портал</h5>

            {foreach $b2b_fields as $name => $control_html}
                <div class="field{if $name === 'frontend_url'} js-b2b-frontend-url-field{/if}">
                    {$control_html}
                </div>
            {/foreach}
        </div>

        {* блок сохранить/удалить *}
        <div class="bottombar sticky s-settings-fixed-bottombar field">
            <div class="value">
                <div class="flexbox middle">
                    <div class="wide js-place-for-errors">
                        <input type="submit" class="button js-form-submit green" value="Сохранить">
                    </div>

                    {if !empty($channel.id)}
                        <div class="nowrap">
                            <button class="button red outlined js-delete-button" type="button">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    {/if}
                </div>
            </div>
        </div>

    </form>
</div>

<script type="text/javascript" src="{$wa_app_static_url}js/backend/channels/channels.js?{$wa->version()}"></script>
<script>
    $(function() {
        "use strict";

        const delete_url = {$wa_app_url|json_encode} + '?module=channels&action=delete';

        const $form = $('#js-sales-channel-form');
        const $frontend_url_input = $form.find('input[name="data[params][frontend_url]"]');

        let $open_storefront_button = $form.find('.js-b2b-open-storefront');

        if (!$open_storefront_button.length && $frontend_url_input.length) {
            const $value = $frontend_url_input.closest('.value');

            $frontend_url_input.wrap('<div class="flexbox middle space-8 js-b2b-storefront-url-line"></div>');

            $open_storefront_button = $(
                '<a class="button light-gray nowrap js-b2b-open-storefront small" href="#" target="_blank" rel="noopener" aria-disabled="true">' +
                'Открыть на витрине &#8594;' +
                '</a>'
            );

            $frontend_url_input.after($open_storefront_button);

            const $hint = $value.find('.hint, p.hint').first();

            if ($hint.length) {
                $value.append($hint);
            }
        }

        const cleanRoutePart = function(value) {
            value = String(value || '').trim();

            if (!value || value === '*') {
                return '';
            }

            value = value.replace(/\*/g, '');
            value = value.replace(/^\/+|\/+$/g, '');

            return value;
        };

        const buildStorefrontUrl = function(params) {
            params = params || {};

            const domain = String(params.domain || '').replace(/^\/+|\/+$/g, '');
            const route_url = cleanRoutePart(params.route_url || '');
            const frontend_url = cleanRoutePart(params.frontend_url || '');

            if (!domain) {
                return '';
            }

            const path = [route_url, frontend_url].filter(Boolean).join('/');
            const protocol = window.location.protocol || 'https:';

            return protocol + '//' + domain + '/' + (path ? path + '/' : '');
        };

        const updateStorefrontButton = function(params) {
            const url = buildStorefrontUrl(params);

            if (url) {
                $open_storefront_button
                    .attr('href', url)
                    .removeClass('disabled')
                    .attr('aria-disabled', 'false');
            } else {
                $open_storefront_button
                    .attr('href', '#')
                    .addClass('disabled')
                    .attr('aria-disabled', 'true');
            }
        };

        updateStorefrontButton({$channel.params|default:[]|json_encode});

        const controller = new SalesChannelForm({
            $place_for_errors: $form.find('.js-place-for-errors'),
            $form: $form
        });

        const $submit_button = $form.find(':submit').last();

        $form.on('save_request', function() {
            $submit_button.prop('disabled', true).after('<div class="spinner"></div>');
        });

        $form.on('save_success save_fail', function() {
            $submit_button.prop('disabled', false).siblings('.spinner').remove();
        });

        $form.on('save_success', function(evt, data) {
            updateStorefrontButton(data.result && data.result.params ? data.result.params : {});
        });

        {if empty($channel.id)}
            $form.on('save_success', function(evt, data) {
                window.location = {$wa_app_url|json_encode} + 'channels/editor/' + data.result.id;
            });
        {else}
            const channel_id = {$channel.id|json_encode};
            const $delete_button = $form.find('.js-delete-button');

            $delete_button.on('click', function(e) {
                e.preventDefault();

                $.waDialog.confirm({
                    title: {_w("Delete permanently?")|json_encode},
                    success_button_title: {_w("Delete")|json_encode},
                    success_button_class: 'danger',
                    cancel_button_title: {_w("Cancel")|json_encode},
                    cancel_button_class: 'light-gray',
                    onSuccess: function() {
                        $delete_button.prop('disabled', true).after(
                            '<div class="spinner"></div>');

                        $.post(delete_url, { id: channel_id }, 'json').then(function() {
                            $submit_button.prop('disabled', false).siblings('.spinner')
                                .remove();
                            window.location = {$wa_app_url|json_encode} + '?action=plugins#/';
                        });
                    }
                });
            });
        {/if}
    });
</script>
