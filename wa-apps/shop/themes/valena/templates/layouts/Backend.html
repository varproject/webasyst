<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>{$wa->appName()} &mdash; {$wa->accountName()}</title>
    {$wa->css()}
    <link type="text/css" rel="stylesheet" href="{$wa_app_static_url}css/apanel.css?v{$wa->version()}">
    <script src="{$wa_url}wa-content/js/jquery/jquery-3.6.0.min.js"></script>
    <script src="{$wa_url}wa-content/js/jquery-wa/wa.js?v={$wa->version(true)}"></script>
    <script src="{$wa_app_static_url}js/apanel.js?v{$wa->version()}"></script>
</head>

{* <body hx-push-url="true" hx-boost="true" hx-target="body"> *}

<body>
    <div id="wa">
        {$wa->header()}
        <div id="wa-app" class="flexbox wrap-mobile">

            <div class="sidebar flexbox overflow-visible width-adaptive-wider mobile-friendly js-app-sidebar">
                {include file="./BackendSidebar.html" inline}
            </div>

            <main id="content" class="content s-hide-scrollbar not-blank js-main-content">
                <div class="b-stream flexbox wrap-mobile">
                    {$content}
                </div>
            </main>

        </div>
    </div>

    <script>
        (function($) {
            // Экземпляр ползунка загрузки
            var loading = $.waLoading({
                top: "4rem" // смещение от верхней границы. Оставить "4rem", если не менялась высота шапки.
            });
            // Время в милисекундах до 100%
            loading.animate(100, 100, true);
        })(jQuery);
    </script>

    {* JS htmx (не зависит от других — можно defer) *}
    <script src="{$wa_app_static_url}js/vendors/htmx-2.0.4.min.js?v={$wa->version()}" defer></script>
</body>

</html>
