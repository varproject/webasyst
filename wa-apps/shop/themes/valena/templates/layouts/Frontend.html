<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>{$wa->title()}</title>
    <meta name="description" content="{$wa->meta('description')|escape}">
    <meta name="keywords" content="{$wa->meta('keywords')|escape}">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {** Nunito **}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    {** bootstrap-icons **}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    {** HTMX **}
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
</head>

<body>

    <div class="legrand-valena-layout" id="legrand-valena-layout">
        {$content}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const burger = document.getElementById("legrand-valena-burger");
            const sidebar = document.querySelector(".legrand-valena-sidebar");
            const overlay = document.getElementById("sidebar-overlay");

            const toggle = () => {
                sidebar.classList.toggle("open");
                overlay.classList.toggle("show");
            };

            burger.addEventListener("click", toggle);
            overlay.addEventListener("click", toggle);
        });
    </script>


    <style>
        /* ---------------------------- БАЗА ---------------------------- */

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #F7F8FA;
            font-family: "Nunito", sans-serif;
            color: #1F2937;
            margin-left: 150px;
        }

        /* Сетка */
        .legrand-valena-layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------------------------- SIDEBAR ---------------------------- */

        .legrand-valena-sidebar {
            width: 300px;
            background: #FFFFFF;
            border-right: 1px solid #E5E7EB;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
        }

        .legrand-valena-sidebar-top {
            flex: 1 1 auto;
            overflow-y: scroll;
            scrollbar-width: none;
        }

        .legrand-valena-sidebar-top::-webkit-scrollbar {
            width: 0;
        }

        .legrand-valena-sidebar-bottom {
            flex: 0 0 auto;
            border-top: 1px solid #E5E7EB;
            background: #FFFFFF;
            padding: 12px;
        }

        .sb-footer {
            font-size: 13px;
            color: #6B7280;
        }

        .legrand-valena-sidebar-brand {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            padding-bottom: 10px;
            text-decoration: none;
            color: inherit;
        }

        .brand-logo {
            width: 46px;
            height: 46px;
            background: #3B82F6;
            color: #FFFFFF;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            margin-right: 12px;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 700;
        }

        .brand-sub {
            font-size: 12px;
            color: #6B7280;
        }

        /* ---------------------------- MAIN ---------------------------- */

        .legrand-valena-main {
            flex: 1 1 auto;
            /* margin-left: 300px; */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER FIXED HEIGHT 64px */
        .legrand-valena-header {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: #FFFFFF;
            border-bottom: 1px solid #E5E7EB;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            flex: 1;
        }

        .cart-btn {
            text-decoration: none;
            padding: 8px 14px;
            background: #3B82F6;
            color: #FFFFFF;
            border-radius: 12px;
            font-weight: 700;
        }

        .cart-btn:hover {
            background: #2563EB;
        }

        /* Контентная зона фиксирована по высоте */
        .legrand-valena-content {
            height: calc(100vh - 64px);
            padding: 20px;
            overflow: scroll;
        }

        /* ---------------------------- BURGER ---------------------------- */
        .burger {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid #D1D5DB;
            background: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            gap: 5px;
        }

        .burger span {
            width: 18px;
            height: 2px;
            background: #374151;
        }

        /* MOBILE */
        @media (max-width: 960px) {
            .burger {
                display: flex;
            }

            .legrand-valena-sidebar {
                transform: translateX(-100%);
                transition: .25s;
            }

            .legrand-valena-sidebar.open {
                transform: translateX(0);
            }

            .sidebar-overlay.show {
                display: block;
            }

            .sidebar-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.3);
                display: none;
            }

            .legrand-valena-main {
                margin-left: 0;
            }
        }

        .header-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-link {
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: #3B82F6;
        }

        .header-link:hover {
            text-decoration: underline;
        }
    </style>

</body>

</html>
