<div class="modal-dialog {$modal_size|default:''}">
    <div class="modal-content">

        <div class="modal-header">
            <h1 class="modal-title fs-5">{$modal_title|escape}</h1>
        </div>

        <div class="modal-body">
            <div class="alert alert-danger mb-3">
                <div class="fw-bold mb-1">Подтвердите удаление</div>
                <div>
                    Плагин <strong>{$plugin_name|escape}</strong> будет удалён из файловой системы приложения.
                    Это действие нельзя отменить.
                </div>
            </div>

            {if !empty($plugin_description)}
                <div class="text-body-secondary small">
                    {$plugin_description|escape}
                </div>
            {/if}

            <form method="post" action="{$post_action_url|escape}" id="plugin_remove_form">
                {$wa->csrf()}
                <input type="hidden" name="id" value="{$plugin_id|escape}">
            </form>
        </div>

        <div class="modal-footer justify-content-start user-select-none">
            <a href="{$close_button_url|escape}" class="btn btn-secondary btn-sm me-2" hx-boost="true">
                Закрыть
            </a>

            <button type="submit" form="plugin_remove_form" class="btn btn-danger btn-sm">
                Удалить
            </button>
        </div>

    </div>
</div>
