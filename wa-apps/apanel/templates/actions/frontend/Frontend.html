<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{if !empty($screen.name)}{$screen.name|escape} — {/if}{$wa->appName()|escape}</title>
    <link rel="stylesheet" href="{$wa_app_static_url}css/frontend/apanel.css?v={$wa->version()}">
    {if !empty($plugin.assets.css)}
        {foreach $plugin.assets.css as $asset}
            <link rel="stylesheet"
                href="{$wa_app_static_url}plugins/{$plugin.plugin|escape}/{$asset|escape}?v={$wa->version()}">
        {/foreach}
    {/if}
</head>

<body class="apanel-storefront">
    <div class="apanel-shell">
        {$content nofilter}
    </div>

    {if !empty($plugin.assets.js)}
        {foreach $plugin.assets.js as $asset}
            <script src="{$wa_app_static_url}plugins/{$plugin.plugin|escape}/{$asset|escape}?v={$wa->version()}" defer></script>
        {/foreach}
    {/if}
</body>

</html>
