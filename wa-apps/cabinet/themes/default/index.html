<!DOCTYPE html>
<html lang="en" dir="ltr" data-scompiler-id="0">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>
        {if $wa->title()}
            {$wa->title()|escape} — {$wa->accountName()|escape}
        {else}
            Личный кабинет — {$wa->accountName()|escape}
        {/if}
    </title>

    {* icon *}
    <link rel="icon" type="image/png" href="images/favicon.png" />

    {* fonts *}
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i,900,900i" />

    {* css *}
    <link rel="stylesheet" href="{$wa_theme_url}vendor/bootstrap/css/bootstrap.ltr.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/highlight.js/styles/github.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/simplebar/simplebar.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/quill/quill.snow.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/air-datepicker/css/datepicker.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/select2/css/select2.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/datatables/css/dataTables.bootstrap5.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/nouislider/nouislider.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}vendor/fullcalendar/main.min.css" />
    <link rel="stylesheet" href="{$wa_theme_url}css/style.css" />
</head>

<body>

    {if $wa->user()->isAdmin()}
        {include file="`$wa_active_theme_path`/main.html" inline}
    {else}
        {include file="`$wa_active_theme_path`/{waRequest::param('module','login')}.html" inline}
    {/if}

    {* scripts *}
    <script src="{$wa_theme_url}vendor/jquery/jquery.min.js"></script>
    <script src="{$wa_theme_url}vendor/feather-icons/feather.min.js"></script>
    <script src="{$wa_theme_url}vendor/simplebar/simplebar.min.js"></script>
    <script src="{$wa_theme_url}vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="{$wa_theme_url}vendor/highlight.js/highlight.pack.js"></script>
    <script src="{$wa_theme_url}vendor/quill/quill.min.js"></script>
    <script src="{$wa_theme_url}vendor/air-datepicker/js/datepicker.min.js"></script>
    <script src="{$wa_theme_url}vendor/air-datepicker/js/i18n/datepicker.en.js"></script>
    <script src="{$wa_theme_url}vendor/select2/js/select2.min.js"></script>
    <script src="{$wa_theme_url}vendor/fontawesome/js/all.min.js" data-auto-replace-svg="" async=""></script>
    <script src="{$wa_theme_url}vendor/chart.js/chart.min.js"></script>
    <script src="{$wa_theme_url}vendor/datatables/js/jquery.dataTables.min.js"></script>
    <script src="{$wa_theme_url}vendor/datatables/js/dataTables.bootstrap5.min.js"></script>
    <script src="{$wa_theme_url}vendor/nouislider/nouislider.min.js"></script>
    <script src="{$wa_theme_url}vendor/fullcalendar/main.min.js"></script>
    <script src="{$wa_theme_url}js/stroyka.js"></script>
    <script src="{$wa_theme_url}js/custom.js"></script>
    <script src="{$wa_theme_url}js/calendar.js"></script>
    <script src="{$wa_theme_url}js/demo.js"></script>
    <script src="{$wa_theme_url}js/demo-chart-js.js"></script>
</body>

</html>
