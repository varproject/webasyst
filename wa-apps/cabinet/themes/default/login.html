<div class="min-h-100 p-0 p-sm-6 d-flex align-items-stretch">

    <div class="card w-25x flex-grow-1 flex-sm-grow-0 m-sm-auto">

        <form method="post" action="{$wa->loginUrl()}" class="card-body p-sm-5 m-sm-3 flex-grow-0">

            <!-- ОБЯЗАТЕЛЬНО: флаг авторизации -->
            <input type="hidden" name="wa_auth_login" value="1">

            <h1 class="mb-0 fs-3">Sign In</h1>
            <div class="fs-exact-14 text-muted mt-2 pt-1 mb-5 pb-2">Log in to your account to continue.</div>

            {if !empty($errors)}
                <div class="alert alert-danger mb-4">
                    {foreach $errors as $e}
                        <div>{$e}</div>
                    {/foreach}
                </div>
            {/if}

            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="text" name="login" class="form-control form-control-lg" required />
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" required />
            </div>

            <div class="mb-4 row py-2 flex-wrap">
                <div class="col-auto me-auto">
                    <label class="form-check mb-0">
                        <input type="checkbox" name="remember" value="1" class="form-check-input" />
                        <span class="form-check-label">Remember me</span>
                    </label>
                </div>

                <div class="col-auto d-flex align-items-center">
                    <a href="{$wa->forgotPasswordUrl()}">Forgot password?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="btn btn-primary btn-lg w-100">Sign In</button>
            </div>

        </form>

        <div class="sa-divider sa-divider--has-text">
            <div class="sa-divider__text">Or continue with</div>
        </div>

        <div class="card-body p-sm-5 m-sm-3 flex-grow-0">

            <!-- Кнопки OAuth: Google, Facebook, Twitter -->
            <div class="d-flex flex-wrap me-n3 mt-n3">
                {$wa->authAdapters(false, ['width'=>700,'height'=>600])}
            </div>

            <div class="form-group mb-0 mt-4 pt-2 text-center text-muted">
                [`Don't have an account`]?
                <a href="{$wa->signupUrl()}">Sign up</a>
            </div>

        </div>

    </div>
</div>
