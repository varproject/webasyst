            <stop offset="100%" stop-color="#7A22FF" />
        </linearGradient>
    </defs>

    <!-- Текст B2B -->
    <text x="80" y="245" font-family="Helvetica, Arial, sans-serif" font-size="160" font-weight="700"
        fill="url(#gradB)">
