<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Фон -->
    <rect width="800" height="400" fill="#0d1228" />

    <!-- Градиент для B2B -->
    <defs>
        <linearGradient id="gradB" x1="20%" y1="20%" x2="40%" y2="50%">
            <stop offset="0%" stop-color="#1FE4FF" />
            <stop offset="100%" stop-color="#7A22FF" />
        </linearGradient>
    </defs>

    <defs>
        <linearGradient id="grad2" x1="30%" y1="30%" x2="70%" y2="70%">
