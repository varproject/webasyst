<!DOCTYPE html>
<html>
<head>
    {$wa->css()}
    {$wa->js()}
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>{$wa->appName()} &mdash; {$wa->accountName()}</title>
    <script src="{$wa_url}wa-content/js/jquery/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" src="{$wa_url}wa-content/js/jquery-wa/wa.core.js?v={$wa->version(true)}"></script>
    <script src="{$wa_app_static_url}js/wrlDates.js?v={$appVersion}"></script>
    <script src="{$wa_url}wa-content/js/jquery-wa/wa.js?v={$wa->version(true)}"></script>
    <script type="text/javascript"
            src="{$wa_url}wa-content/js/jquery-ui/jquery.ui.core.min.js?v={$wa->version()}"></script>
    <script type="text/javascript"
            src="{$wa_url}wa-content/js/jquery-ui/jquery.ui.widget.min.js?v={$wa->version()}"></script>

    <script type="text/javascript"
            src="{$wa_url}wa-content/js/jquery-ui/jquery.ui.mouse.min.js?v={$wa->version()}"></script>
    <script type="text/javascript"
            src="{$wa_url}wa-content/js/jquery-ui/jquery.ui.position.min.js?v={$wa->version()}"></script>
    <script src="{$wa_url}wa-content/js/jquery-ui/jquery.ui.sortable.min.js"></script>
    <script src="{$wa_url}wa-content/js/sortable/sortable.min.js"></script>
    {*<script src="{$wa_url}wa-content/js/sortable/jquery-sortable.min.js"></script>*}
    <link rel="stylesheet" href="{$wa_app_static_url}css/devapi.css?v={$appVersion}">
    <link rel="stylesheet" href="{$wa_app_static_url}css/wrl.css?v={$appVersion}">
    <script src="{$wa_app_static_url}js/vendors/vue/{$vueFile}"></script>
    <script src="{$wa_app_static_url}js/vendors/vue/{$vueRouterFile}"></script>
</head>
<body>
<div id="wa">
    {$wa->header()}
    <div id="devapi-app">
        {literal}
            <div id="devapi-error" style="display: none;">
                <span class="alert danger" v-if="errorText" style="text-align: center; position: fixed !important; top: 4rem; left: 0; right: 0; z-index: 10000;">
                    <span class="icon"><i class="fas fa-skull"></i></span>&nbsp;&nbsp;{{errorText}}
                </span>
            </div>
        {/literal}
        <div class="flexbox wrap-mobile">
            <div class="sidebar rail" id="devapi-sidebar">
                {include './sidebar.html'}
            </div>
            <div class="devapi content" style="background-color: var(--background-color-blank)">
                <router-view
                    @run="runAction=$event"
                    @finish="finishAction($event)"
                    @error="setError($event)"
                    :runner="runAction"
                    :finish="runResult"
                ></router-view>
            </div>
        </div>
    </div>
</div>
</body>
</html>
{include './include.components.html'}
